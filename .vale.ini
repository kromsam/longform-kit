StylesPath = .vale/styles
MinAlertLevel = suggestion

# Install with `vale sync`. Academic is authoritative; proselint remains an
# advisory copy-editing layer.
Packages = proselint

[formats]
qmd = md
Rmd = md

[*.{md,markdown,qmd,Rmd}]
BasedOnStyles = Vale, Academic, proselint

# Harper owns live spelling and grammar checks for the manuscript.
Vale.Spelling = NO
Vale.Terms = YES

# This serial-comma check is intentionally heuristic. Enable it for a focused
# final pass when useful.
Academic.OxfordCommaOptional = NO

# Academic house rules decide spelling, typography, dates, punctuation, and
# citation mechanics. Disable overlapping proselint checks.
proselint.Spelling = NO
proselint.Typography = NO
proselint.DateCase = NO
proselint.DateMidnight = NO
proselint.DateRedundancy = NO
proselint.DateSpacing = NO

# Keep remaining proselint checks advisory rather than authoritative.
proselint.Airlinese = suggestion
proselint.AnimalLabels = suggestion
proselint.Annotations = suggestion
proselint.Apologizing = suggestion
proselint.Archaisms = suggestion
proselint.But = suggestion
proselint.Cliches = suggestion
proselint.CorporateSpeak = suggestion
proselint.Currency = suggestion
proselint.Cursing = suggestion
proselint.DenizenLabels = suggestion
proselint.Diacritical = suggestion
proselint.GenderBias = suggestion
proselint.GroupTerms = suggestion
proselint.Hedging = suggestion
proselint.Hyperbole = suggestion
proselint.Jargon = suggestion
proselint.LGBTOffensive = suggestion
proselint.LGBTTerms = suggestion
proselint.Malapropisms = suggestion
proselint.Needless = suggestion
proselint.Nonwords = suggestion
proselint.Oxymorons = suggestion
proselint.P-Value = suggestion
proselint.RASSyndrome = suggestion
proselint.Skunked = suggestion
proselint.Uncomparables = suggestion
proselint.Very = suggestion
