# Main Quarto configuration. Included-file paths remain relative to the project
# root where _quarto.yml is discovered.
project:
  type: book
  output-dir: build

book:
  output-file: "longform-document"

bibliography: references/library.json
csl: references/style.csl
toc: true
toc-title: Contents
toc-depth: 2
number-sections: true
link-citations: true
resource-path:
  - .
  - references/.csl-parents
  - references/zotero-styles
  - references/zotero-styles/hidden

shortcodes:
  - quarto/extensions/epigraph/epigraph.lua

longform:
  gfm-toc-depth: 2
  required-fonts: []

format:
  pdf:
    colorlinks: false
    documentclass: report
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    linestretch: 1.25
    indent: true
    top-level-division: chapter
    classoption:
      - twoside
      - openright
    geometry: "twoside,left=36mm,right=36mm"
    include-in-header:
      - file: quarto/extensions/epigraph/epigraph.tex
  docx:
    toc: true
    toc-depth: 2
    reference-doc: references/reference.docx
  latex:
    colorlinks: false
    documentclass: report
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    linestretch: 1.25
    indent: true
    top-level-division: chapter
    classoption:
      - twoside
      - openright
    geometry: "twoside,left=36mm,right=36mm"
    include-in-header:
      - file: quarto/extensions/epigraph/epigraph.tex
