# Manuscript metadata
#
# Author-facing information about the manuscript itself: its title, subtitle,
# author, date, language, and output filename. Quarto merges these values into
# the project through the `metadata-files` list in root `_quarto.yml`. The
# chapter list lives in writing/manuscript/chapters.yml.
lang: en-GB

book:
  output-file: "longform-document"
  title: "A Longform Document"
  subtitle: "A Zettlr, Quarto, Pandoc, and Zotero project"
  author: "Author Name"
  date: today
  date-format: long
