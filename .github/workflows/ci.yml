name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build and verify every output (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          version: 1.9.38

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up TinyTeX
        uses: r-lib/actions/setup-tinytex@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2

      - name: Install PDF typography, standards, and imposition packages
        run: >-
          tlmgr install
          ebgaramond epigraph etoolbox microtype nowidow
          tagpdf
          pdfjam pdfpages

      - name: Provision checked DOCX font sources
        shell: bash
        run: |
          set -euo pipefail
          commit=e608414f52e532b68e2182f96b4ce9db35335593
          archive="$RUNNER_TEMP/EBGaramond12-$commit.zip"
          expected=07ec82a5b503922f5d45afbb2ef585059308419a446d5fd79488f964d233c93c
          curl --fail --location --silent --show-error \
            "https://github.com/octaviopardo/EBGaramond12/archive/$commit.zip" \
            --output "$archive"
          actual="$(openssl dgst -sha256 "$archive" | awk '{print $NF}')"
          if [ "$actual" != "$expected" ]; then
            echo "EB Garamond archive checksum mismatch" >&2
            exit 1
          fi
          unzip -q "$archive" -d "$RUNNER_TEMP"
          font_dir="$RUNNER_TEMP/EBGaramond12-$commit/fonts/otf"
          echo "LONGFORM_EB_GARAMOND_DIR=$font_dir" >> "$GITHUB_ENV"

      - name: Install PDF inspection tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libreoffice-writer poppler-utils python3-uno

      - name: Install PDF inspection tools (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler qpdf

      - name: Install compatible qpdf (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          version=12.3.2
          archive="$RUNNER_TEMP/qpdf-$version-bin-linux-x86_64.zip"
          expected=44f2c53bf784c0143128d80d2b9946e9793962c5bb403b75c0024cb4d8e346b9
          curl --fail --location --silent --show-error \
            "https://github.com/qpdf/qpdf/releases/download/v$version/qpdf-$version-bin-linux-x86_64.zip" \
            --output "$archive"
          actual="$(openssl dgst -sha256 "$archive" | awk '{print $NF}')"
          if [ "$actual" != "$expected" ]; then
            echo "qpdf archive checksum mismatch" >&2
            exit 1
          fi
          destination="$RUNNER_TEMP/qpdf-$version"
          unzip -q "$archive" -d "$destination"
          qpdf="$destination/bin/qpdf"
          "$qpdf" --version
          echo "QPDF=$qpdf" >> "$GITHUB_ENV"

      - name: Install veraPDF
        run: quarto install verapdf --no-prompt

      - name: Locate veraPDF
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Linux)
              data_root="${XDG_DATA_HOME:-$HOME/.local/share}/quarto"
              ;;
            macOS)
              data_root="$HOME/Library/Application Support/quarto"
              ;;
            *)
              echo "Unsupported runner for veraPDF discovery: $RUNNER_OS" >&2
              exit 1
              ;;
          esac
          verifier="$data_root/verapdf/verapdf"
          if [ ! -x "$verifier" ]; then
            echo "Quarto did not install an executable veraPDF at $verifier" >&2
            exit 1
          fi
          "$verifier" --version
          echo "QUARTO_VERAPDF=$verifier" >> "$GITHUB_ENV"

      - name: Build and inspect every output
        env:
          LONGFORM_VALIDATE_PDF: "1"
        run: |
          python3 publishing/tests/test_optional_features.py
          python3 publishing/tests/test_build.py

      - name: Exercise real LibreOffice/UNO TOC refresh (Linux)
        if: runner.os == 'Linux'
        env:
          LONGFORM_TEST_DOCX_REFRESH: "1"
        run: python3 publishing/tests/test_optional_features.py docx-toc
