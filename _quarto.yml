# Longform Kit keeps its shared build configuration here. Author metadata and
# chapter order remain in document/ so they can be edited without touching the
# rendering setup. Put machine-local citation paths in _quarto.yml.local.
metadata-files:
  - document/metadata.yml
  - document/chapters.yml

project:
  type: book
  output-dir: build

book:
  output-file: "longform-document"

toc: true
toc-depth: 1
number-sections: false
link-citations: true

# Keep the root adapter structurally invisible when front matter has no
# heading. The build script separately sanitizes generated DOCX properties.
filters:
  - filters/longform-front-matter.lua

format:
  pdf:
    colorlinks: false
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    linestretch: 1.25
    indent: true
    mainfont: EB Garamond
    mainfontoptions:
      - Numbers=OldStyle
    sansfont: EB Garamond
    sansfontoptions:
      - Numbers=OldStyle
    monofont: EB Garamond
    monofontoptions:
      - Numbers=OldStyle
    # Keep at least two lines of a paragraph together at page boundaries.
    include-in-header:
      text: |
        \usepackage[all]{nowidow}
    # Use KOMA's symmetric default margins while retaining the two-sided
    # pagination needed for physical recto starts.
    classoption: "twoside=semi,openright"
  docx:
    reference-doc: references/reference.docx
