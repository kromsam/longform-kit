# Longform Kit keeps its shared build configuration here. Author metadata and
# chapter order remain in document/ so they can be edited without touching the
# rendering setup. Put machine-local citation paths in _quarto.yml.local.
metadata-files:
  - document/metadata.yml
  - document/chapters.yml

project:
  type: book
  output-dir: build

book:
  output-file: "longform-document"

toc: true
toc-depth: 1
number-sections: false
link-citations: true

# Keep the root adapter structurally invisible when front matter has no
# heading. The build script separately sanitizes generated DOCX properties.
filters:
  - filters/longform-front-matter.lua

format:
  pdf:
    colorlinks: false
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    # KOMA's 12 pt baseline is 14.5 pt; 1.05 yields approximately 12/15.2.
    linestretch: 1.05
    indent: true
    mainfont: EB Garamond
    mainfontoptions:
      - Numbers=OldStyle
    sansfont: EB Garamond
    sansfontoptions:
      - Numbers=OldStyle
    monofont: EB Garamond
    monofontoptions:
      - Numbers=OldStyle
    # Keep at least two lines of a paragraph together at page boundaries. Set
    # an exact Bringhurst-informed measure through KOMA, preserving any BCOR.
    include-in-header:
      text: |
        \usepackage[all]{nowidow}
        \areaset[current]{110mm}{178mm}
        % Bringhurst-style notes: 9/12 text, full-size hanging labels, and
        % whitespace instead of a separator rule. Normal note splitting stays enabled.
        \setkomafont{footnote}{\normalfont\fontsize{9pt}{12pt}\selectfont}
        \setkomafont{footnotelabel}{\normalfont\fontsize{9pt}{12pt}\selectfont}
        \deffootnote[1.5em]{1.5em}{1em}{\thefootnotemark\enskip}
        \setfootnoterule[0pt]{0pt}
    # Centre the type area while retaining pagination for physical recto starts.
    classoption: "twoside=semi,openright"
  docx:
    reference-doc: references/reference.docx
