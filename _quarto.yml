# Longform Kit keeps its shared build configuration here. Author metadata and
# chapter order remain in writing/manuscript/ so they can be edited without
# touching the rendering setup. Put machine-local citation paths in
# _quarto.yml.local.
metadata-files:
  - writing/manuscript/metadata.yml
  - writing/manuscript/chapters.yml

profile:
  default: custom

project:
  type: book
  output-dir: output

toc: true
toc-depth: 1
number-sections: false
link-citations: true

# Keep the root adapter structurally invisible when front matter has no
# heading. The build script separately sanitizes generated DOCX properties.
filters:
  - publishing/filters/front-matter.lua

format:
  pdf:
    colorlinks: false
    pdf-engine: lualatex
    papersize: a4
    # KOMA needs a keyed class option (below) for the non-standard 15.25 pt
    # body size. Its 18.3 pt native baseline and this stretch yield 19.3 pt.
    linestretch: 1.055
    indent: true
    mainfont: EB Garamond
    mainfontoptions:
      - Numbers=OldStyle
    sansfont: EB Garamond
    sansfontoptions:
      - Numbers=OldStyle
    monofont: EB Garamond
    monofontoptions:
      - Numbers=OldStyle
    # Core PDF composition. Downstream profiles may union-add compatible
    # standards, but must not replace or disable the archival default.
    pdf-standard:
      - a-4f
    microtypeoptions:
      - protrusion=true
      - expansion=true
      - tracking=false
      - kerning=false
      - spacing=false
      - stretch=20
      - shrink=20
      - step=1
      - verbose=true
    include-in-header:
      - file: publishing/pdf/typography.tex
    template-partials:
      - publishing/pdf/standards/document-metadata.latex
    classoption: "twoside,openright,BCOR=0mm,fontsize=15.25pt"
  docx:
    reference-doc: publishing/docx/reference.docx
