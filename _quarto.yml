project:
  type: book
  output-dir: build

book:
  title: "A Longform Document"
  subtitle: "A reproducible Zettlr, Quarto, Pandoc, and Zotero project"
  author: "Author Name"
  date: today
  date-format: "D MMMM YYYY"
  output-file: "longform-document"
  chapters:
    - index.md
    - document/manuscript/01-introduction.md
    - document/manuscript/02-conclusion.md
    - document/references.md

bibliography: references/library.json
csl: references/style.csl
lang: en-GB
toc: true
toc-title: Contents
toc-depth: 2
number-sections: true
link-citations: true

longform:
  gfm-toc-depth: 2
  required-fonts: []

format:
  pdf:
    colorlinks: false
    documentclass: report
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    linestretch: 1.25
    indent: true
    top-level-division: chapter
    classoption:
      - twoside
      - openright
    geometry: "twoside,left=36mm,right=36mm"
    include-in-header:
      - file: _extensions/epigraph/epigraph.tex
  docx:
    toc: true
    toc-depth: 2
    reference-doc: references/reference.docx
  latex:
    colorlinks: false
    documentclass: report
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    linestretch: 1.25
    indent: true
    top-level-division: chapter
    classoption:
      - twoside
      - openright
    geometry: "twoside,left=36mm,right=36mm"
    include-in-header:
      - file: _extensions/epigraph/epigraph.tex
