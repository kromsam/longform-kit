project:
  type: book
  output-dir: build

# Author-owned manuscript metadata lives under document/ so it sits with the
# rest of the authored content. Quarto merges these files into the config below:
#   - document/metadata.yml  title, subtitle, author, date, language
#   - document/chapters.yml  the ordered chapter list
metadata-files:
  - document/metadata.yml
  - document/chapters.yml

book:
  output-file: "longform-document"

bibliography: references/library.json
csl: references/style.csl
toc: true
toc-title: Contents
toc-depth: 2
number-sections: true
link-citations: true

longform:
  gfm-toc-depth: 2
  required-fonts: []

format:
  pdf:
    colorlinks: false
    documentclass: report
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    linestretch: 1.25
    indent: true
    top-level-division: chapter
    classoption:
      - twoside
      - openright
    geometry: "twoside,left=36mm,right=36mm"
    include-in-header:
      - file: _extensions/epigraph/epigraph.tex
  docx:
    toc: true
    toc-depth: 2
    reference-doc: references/reference.docx
  latex:
    colorlinks: false
    documentclass: report
    pdf-engine: lualatex
    papersize: a4
    fontsize: 12pt
    linestretch: 1.25
    indent: true
    top-level-division: chapter
    classoption:
      - twoside
      - openright
    geometry: "twoside,left=36mm,right=36mm"
    include-in-header:
      - file: _extensions/epigraph/epigraph.tex
