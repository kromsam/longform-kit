# Manuscript metadata
#
# Author-facing information about the manuscript itself: its title, subtitle,
# author, date, and language. Quarto merges these values into the project through
# the `metadata-files` list in the root ../_quarto.yml discovery loader.
#
# The chapter list lives in document/chapters.yml; structural build settings
# such as the output filename stay in ../_quarto.yml.
lang: en-GB

book:
  title: "A Longform Document"
  subtitle: "A Zettlr, Quarto, Pandoc, and Zotero project"
  author: "Author Name"
  date: today
  date-format: long
