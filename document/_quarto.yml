project:
  type: longform-kit
  output-dir: build

book:
  title: "A Longform Document"
  subtitle: "A reproducible Zettlr, Quarto, Pandoc, and Zotero project"
  author: "Author Name"
  date: today
  date-format: "D MMMM YYYY"
  output-file: "longform-document"
  chapters:
    - index.qmd
    - manuscript/01-introduction.md
    - manuscript/02-conclusion.md
    - references.md

bibliography: references/library.json
csl: references/style.csl
lang: en-GB
toc-title: Contents
toc-depth: 2
number-sections: true
link-citations: true

longform:
  student-number: ""
  degree-title: ""
  supervisor: ""
  institute: ""
  bibliography-pagebreaks: 1

format:
  longform-kit-pdf: default
  longform-kit-docx: default
  longform-kit-latex: default
