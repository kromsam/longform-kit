title: Longform Kit
author: Sam Simons
version: 0.1.0
quarto-required: ">=1.9.38 <1.10.0"
contributes:
  project:
    project:
      type: book
  formats:
    pdf:
      citeproc: false
      colorlinks: false
      documentclass: report
      pdf-engine: lualatex
      papersize: a4
      fontsize: 12pt
      linestretch: 1.25
      indent: true
      top-level-division: chapter
      classoption:
        - twoside
        - openright
      geometry: "twoside,left=36mm,right=36mm"
      filters:
        - pagebreak.lua
        - longform.lua
      include-in-header: longform.tex
      template-partials:
        - before-body.tex
    latex:
      citeproc: false
      colorlinks: false
      documentclass: report
      pdf-engine: lualatex
      papersize: a4
      fontsize: 12pt
      linestretch: 1.25
      indent: true
      top-level-division: chapter
      classoption:
        - twoside
        - openright
      geometry: "twoside,left=36mm,right=36mm"
      filters:
        - pagebreak.lua
        - longform.lua
      include-in-header: longform.tex
      template-partials:
        - before-body.tex
    docx:
      citeproc: false
      toc: false
      toc-depth: 2
      reference-doc: reference.docx
      filters:
        - pagebreak.lua
        - longform.lua
